{% extends 'base.html' %}
{% load tailwind_tags %}
{% tailwind_css %}



{% block title %}{{ title }}{% endblock %}


{% block header %}
    <!-- coustom header -->
   
{% endblock %}

{% block content %}

<!-- Body content goes here -->

<div class="max-w-2xl mx-auto mt-10">
    <!-- Header -->
    <div class="mb-8 text-center">
        <h2 class="text-3xl font-bold text-gray-800 mb-2">{{ title }}</h2>
    </div>

    <!-- Form Card -->
    <div class="bg-white rounded-2xl shadow-lg border border-gray-100 p-8">
        <form method="POST" novalidate class="space-y-6">
            {% csrf_token %}

            <!-- Form Fields -->
            <div class="space-y-4 text-gray-800">
                {{ form }}
            </div>

            <!-- Buttons -->
            <div class="flex flex-col sm:flex-row gap-4 pt-4">
                <button type="submit" name="save" 
                    class="flex-1 bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-3 px-6 rounded-xl font-semibold hover:from-blue-700 hover:to-indigo-700 transition-all transform hover:scale-[1.02] shadow-md flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                    Go to Resume
                </button>
            </div>
        </form>
    </div>
</div>

{% endblock %}
